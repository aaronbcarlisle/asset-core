# Alembic config for the assetcore binding DB.
# Usage (Postgres prod):  ASSETCORE_DSN=postgresql://... alembic -c assetcore/db/alembic.ini upgrade head
# The migration uses portable SQLAlchemy types, so it also runs on sqlite (how it
# is verified in CI). The canonical reference DDL remains infra/schema.sql; this
# migration is the managed path for the live database.
[alembic]
script_location = %(here)s/migrations
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is set at runtime from ASSETCORE_DSN in migrations/env.py.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
